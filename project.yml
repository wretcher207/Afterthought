name: Afterthought
options:
  bundleIdPrefix: com.deadpixel
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Afterthought:
    type: application
    platform: macOS
    sources:
      - path: Afterthought
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deadpixel.afterthought
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Dead Pixel Design"
        CODE_SIGN_ENTITLEMENTS: Afterthought/App/Afterthought.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
