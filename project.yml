name: Afterthought
options:
  bundleIdPrefix: com.deadpixel
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    # Stable self-signed identity so TCC (Screen Recording) grants survive rebuilds.
    # Created locally via `security import`; ad-hoc signing changes the cdhash every
    # build and drops the grant. See ERRORS.md.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Afterthought Dev"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    # Xcode's split debug dylib requires the main binary and the dylib to share a
    # Team ID; our self-signed cert has none, so dyld rejects it at launch. Single
    # binary avoids the mismatch. See ERRORS.md.
    ENABLE_DEBUG_DYLIB: NO
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Afterthought:
    type: application
    platform: macOS
    sources:
      - path: Afterthought
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deadpixel.afterthought
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Dead Pixel Design"
        CODE_SIGN_ENTITLEMENTS: Afterthought/App/Afterthought.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
